name: smart-archive
label: Smart Archive
category: email
description: Lists emails that can be archived (newsletters, receipts, notifications) for your review
inputs: []
steps:
  - id: newsletters
    command: gws gmail users messages list
    params:
      userId: "me"
      q: "unsubscribe in:inbox"
      maxResults: 30
  - id: receipts
    command: gws gmail users messages list
    params:
      userId: "me"
      q: "receipt OR order confirmation in:inbox"
      maxResults: 20
  - id: notifications
    command: gws gmail users messages list
    params:
      userId: "me"
      q: "noreply in:inbox"
      maxResults: 20
output:
  format: list
