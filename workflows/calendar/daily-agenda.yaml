name: daily-agenda
label: Daily Agenda
category: calendar
description: Shows all of today's meetings with times and attendees
inputs: []
steps:
  - id: todays_events
    command: gws calendar events list
    params:
      calendarId: "primary"
      maxResults: 20
      orderBy: "startTime"
      singleEvents: true
output:
  format: list
